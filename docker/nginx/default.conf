# ==============================================================================
# Nginx Dual Virtual Host Configuration (HTTP & HTTPS)
# ==============================================================================

# ------------------------------------------------------------------------------
# HTTP Server (Port 80)
# ------------------------------------------------------------------------------
server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html index.htm;

    # Use relative redirects to preserve external port (e.g. 8801 mapped to 80)
    absolute_redirect off;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP scripts to PHP-FPM container on port 9000
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        
        # FastCGI parameters
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Prevent timeout during debug sessions
        fastcgi_read_timeout 3600s;
        fastcgi_send_timeout 3600s;
    }

    # Block sensitive hidden files
    location ~ /\. {
        deny all;
    }
}

# ------------------------------------------------------------------------------
# HTTPS Server (Port 443)
# ------------------------------------------------------------------------------
server {
    listen 443 ssl;
    server_name localhost;
    root /var/www/html;
    index index.php index.html index.htm;

    # Use relative redirects to preserve external port (e.g. 8811 mapped to 443)
    absolute_redirect off;

    # SSL Server Certificates
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # Logs
    access_log /var/log/nginx/ssl_access.log;
    error_log /var/log/nginx/ssl_error.log;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP scripts to PHP-FPM container on port 9000
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        
        # FastCGI parameters
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # IMPORTANT: Tells PHP that the connection is HTTPS
        fastcgi_param HTTPS on;
        
        # Prevent timeout during debug sessions
        fastcgi_read_timeout 3600s;
        fastcgi_send_timeout 3600s;
    }

    # Block sensitive hidden files
    location ~ /\. {
        deny all;
    }
}
