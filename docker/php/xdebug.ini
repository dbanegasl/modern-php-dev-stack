; ==============================================================================
; Xdebug 3 Configuration for Local Development
; ==============================================================================

[xdebug]
; Enable step debugging and rich development output
xdebug.mode = ${XDEBUG_MODE}

; Start debugging automatically on every request
xdebug.start_with_request = yes

; Port used by modern VS Code PHP Debug extension
xdebug.client_port = 9003

; macOS/Windows Docker Desktop DNS host loopback
xdebug.client_host = host.docker.internal

; Optional: fall back to incoming HTTP request IP if needed
xdebug.discover_client_host = 0

; Diagnostic logs (commented out by default to avoid disk fill)
; xdebug.log = /var/log/xdebug.log
; xdebug.log_level = 7
